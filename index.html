<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Love You Pitchaporn</title>
<style>
body{
  margin:0;
  background:black;
  overflow:hidden;
  display:flex;
  justify-content:center;
  align-items:center;
}
canvas{position:absolute;}
#startBtn{
  position:absolute;
  padding:15px 30px;
  font-size:20px;
  background:#ff1493;
  color:white;
  border:none;
  border-radius:30px;
  cursor:pointer;
  z-index:10;
}
</style>
</head>
<body>

<button id="startBtn">💖 แตะเพื่อเริ่ม 💖</button>

<audio id="bgm" loop>
  <source src="song.mp4" type="audio/mp4">
</audio>

<canvas id="c"></canvas>

<script>
const canvas = document.getElementById("c");
const ctx = canvas.getContext("2d");
const btn = document.getElementById("startBtn");
const audio = document.getElementById("bgm");

canvas.width = window.innerWidth;
canvas.height = window.innerHeight;

let points = [];
let message = "love you pitchaporn";

// สูตรหัวใจ
function heart(t){
  let x = 16 * Math.pow(Math.sin(t),3);
  let y = 13*Math.cos(t)
          -5*Math.cos(2*t)
          -2*Math.cos(3*t)
          -Math.cos(4*t);
  return {x:x, y:-y};
}

// สร้างหัวใจเต็มดวงแบบไม่แน่นเกิน
for(let t=0; t<Math.PI*2; t+=0.08){
  for(let i=0;i<15;i++){
    let h = heart(t);
    let r = Math.random();
    let scale = 25*r;

    points.push({
      x:h.x*scale,
      y:h.y*scale
    });
  }
}

let time=0;

function draw(){
  ctx.clearRect(0,0,canvas.width,canvas.height);

  time+=0.02;
  let scalePulse = 1 + Math.sin(time)*0.05; // หัวใจเต้นนิด ๆ

  points.forEach(p=>{
    let x = p.x*scalePulse + canvas.width/2;
    let y = p.y*scalePulse + canvas.height/2;

    ctx.fillStyle="#ff4da6";
    ctx.shadowColor="#ff1493";
    ctx.shadowBlur=10;
    ctx.font="bold 14px monospace";
    ctx.fillText(message,x,y);
  });

  requestAnimationFrame(draw);
}

draw();

btn.addEventListener("click",()=>{
  audio.play();
  btn.style.display="none";
});
</script>

</body>
</html>
